name: CI

on:
  push:
  pull_request:

jobs:
  php-lint:
    name: PHP syntax lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint all PHP files
        run: |
          find . -name "*.php" -not -path "./assets/vendor/*" -print0 \
            | xargs -0 -n1 -P4 php -l
