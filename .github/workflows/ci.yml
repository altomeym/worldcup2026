name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php-lint:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Lint all PHP files
        run: |
          err=0
          while IFS= read -r f; do
            if ! php -l "$f" > /dev/null 2>&1; then
              echo "::error file=$f::PHP syntax error"
              php -l "$f" || true
              err=1
            fi
          done < <(find . -name '*.php' -not -path './vendor/*' -not -path './.git/*')
          if [ "$err" -eq 0 ]; then echo "All PHP files passed php -l"; fi
          exit $err
