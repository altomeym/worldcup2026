# Run the whole site with one command:
#
#   docker compose up
#
# Then open  http://localhost:8080
# Works with zero configuration. PHP/MySQL are NOT required on your machine.
services:
  web:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
